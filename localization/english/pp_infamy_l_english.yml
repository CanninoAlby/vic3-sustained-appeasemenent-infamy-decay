l_english:
 pp_infamy_decision: "Crafting a Positive National Image"
 pp_infamy_decision_desc: "Public diplomacy has always been one of our focal points."
 pp_infamy.0.t: "A More Benevolent Image"
 pp_infamy.0.d: "Amidst the tangled web of international relations, it's time to elevate our outreach, deepen our engagement, and amplify our efforts to clarify the misconceptions about our recent military maneuvers."
 pp_infamy.0.f: "\"While our special military operations have been frequent in recent years, one cannot help but feel a tug at the heartstrings when gazing upon the struggling masses still mired in hardship. This is the path to redemption, a humanitarian endeavor that resonates with our soul.\""
 pp_infamy.1.n: "Scholarly Dialogues (@money![GetPlayer.MakeScope.ScriptValue('pp_cost_tier_1')|0v]/w)"
 pp_infamy.1.tt: "Academics worldwide see our recent actions as aligning with the global tide of progress."
 modifier_positive_propaganda.1: "Cutting-Edge Research Findings"
 pp_infamy.2.n: "Media Partnerships (@money![GetPlayer.MakeScope.ScriptValue('pp_cost_tier_2')|0v]/w)"
 pp_infamy.2.tt: "A chorus of media outlets across the globe are willing to lend their voices to our cause."
 modifier_positive_propaganda.2: "Enhancing Our Global Reputation"
 pp_infamy.3.n: "Diplomatic Visits (@money![GetPlayer.MakeScope.ScriptValue('pp_cost_tier_3')|0v]/w)"
 pp_infamy.3.tt: "The necessity for peaceful coexistence between nations has never been more critical."
 modifier_positive_propaganda.3: "A Diplomatic Triumph"
 pp_infamy.et: "Revoke the Initiative"
 pp_infamy.et.tt: "Our robust might is more than capable of navigating and amending the negative perceptions cast upon us by the outside world."
 je_appeasement_campaign_title: "Active Appeasement Campaign"
 je_appeasement_campaign_desc: "We are currently engaged in a global lobbying effort to restore our international reputation.\n\n[ROOT.GetCountry.GetCustom('pp_active_tier_desc')]"
 pp_tier_1_active_desc: "We are currently implementing Tier 1: Scholarly Dialogues. This involves funding international academic research and publishing findings that favor our geopolitical positions."
 pp_tier_2_active_desc: "We are currently implementing Tier 2: Media Partnerships. We have established strategic alliances with major global news networks to ensure a more balanced coverage of our national interests."
 pp_tier_3_active_desc: "We are currently implementing Tier 3: Diplomatic Visits. Our highest-level officials are conducting a series of world tours, engaging in direct face-to-face diplomacy to resolve international tensions."
 pp_appeasement_expense: "International Appeasement Payments"
 modifier_pp_appeasement_expense: "International Appeasement Payments"
